<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0d9488" rx="64"/>
  <g fill="#ffffff">
    <!-- Hotel Building -->
    <rect x="120" y="140" width="272" height="300" fill="#ffffff" stroke="#0d9488" stroke-width="4"/>
    
    <!-- Roof -->
    <polygon points="256,80 100,140 412,140" fill="#ffffff"/>
    
    <!-- Windows Row 1 -->
    <rect x="150" y="170" width="40" height="40" fill="#0d9488" rx="4"/>
    <rect x="236" y="170" width="40" height="40" fill="#0d9488" rx="4"/>
    <rect x="322" y="170" width="40" height="40" fill="#0d9488" rx="4"/>
    
    <!-- Windows Row 2 -->
    <rect x="150" y="230" width="40" height="40" fill="#0d9488" rx="4"/>
    <rect x="236" y="230" width="40" height="40" fill="#0d9488" rx="4"/>
    <rect x="322" y="230" width="40" height="40" fill="#0d9488" rx="4"/>
    
    <!-- Windows Row 3 -->
    <rect x="150" y="290" width="40" height="40" fill="#0d9488" rx="4"/>
    <rect x="236" y="290" width="40" height="40" fill="#0d9488" rx="4"/>
    <rect x="322" y="290" width="40" height="40" fill="#0d9488" rx="4"/>
    
    <!-- Door -->
    <rect x="216" y="360" width="80" height="80" fill="#0d9488" rx="8"/>
    <circle cx="275" cy="400" r="5" fill="#ffffff"/>
    
    <!-- Star (Hotel Rating) -->
    <polygon points="256,100 265,120 287,120 269,133 276,153 256,140 236,153 243,133 225,120 247,120" fill="#fbbf24"/>
  </g>
</svg>
